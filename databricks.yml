bundle:
  name: routing-address-first

variables:
  catalog:
    description: Unity Catalog catalog for all routing assets and tables
    default: demos
  schema:
    description: Unity Catalog schema for all routing assets and tables
    default: routing
  volume:
    description: Shared managed volume for Photon / OSRM assets
    default: routing_assets
  region:
    description: GeoFabrik region slug
    default: indiana
  cpu_spark_version:
    description: DBR for asset prep, geocoding, and CPU routing
    default: 17.3.x-cpu-ml-scala2.13
  cpu_node_type_id:
    description: CPU node type with local disk
    default: m5d.4xlarge
  geocode_node_type_id:
    description: CPU node type used for Photon + OSRM geocoding init
    default: m5d.4xlarge

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: DEFAULT
    resources:
      jobs:
        routing_end_to_end:
          job_clusters:
            - job_cluster_key: asset_prep_cluster
              new_cluster:
                aws_attributes:
                  availability: SPOT_WITH_FALLBACK
                  first_on_demand: 1
                  zone_id: us-east-2a
                data_security_mode: SINGLE_USER
                single_user_name: ${workspace.current_user.userName}
                spark_version: ${var.cpu_spark_version}
                node_type_id: ${var.cpu_node_type_id}
                num_workers: 0
                spark_conf:
                  spark.databricks.cluster.profile: singleNode
                  spark.master: local[*]
                custom_tags:
                  ResourceClass: SingleNode

            - job_cluster_key: geocode_cluster
              new_cluster:
                aws_attributes:
                  availability: SPOT_WITH_FALLBACK
                  first_on_demand: 1
                  zone_id: us-east-2a
                data_security_mode: SINGLE_USER
                single_user_name: ${workspace.current_user.userName}
                spark_version: ${var.cpu_spark_version}
                node_type_id: ${var.geocode_node_type_id}
                num_workers: 2
                spark_conf:
                  spark.databricks.pyspark.dataFrameChunk.enabled: "true"
                  spark.task.resource.gpu.amount: "0"
                init_scripts:
                  - volumes:
                      destination: /Volumes/${var.catalog}/${var.schema}/${var.volume}/init/photon-worker.sh
                  - volumes:
                      destination: /Volumes/${var.catalog}/${var.schema}/${var.volume}/init/osrm-worker.sh

            - job_cluster_key: cpu_distance_cluster
              new_cluster:
                aws_attributes:
                  availability: SPOT_WITH_FALLBACK
                  first_on_demand: 1
                  zone_id: us-east-2a
                data_security_mode: SINGLE_USER
                single_user_name: ${workspace.current_user.userName}
                spark_version: ${var.cpu_spark_version}
                node_type_id: ${var.cpu_node_type_id}
                num_workers: 4
                spark_conf:
                  spark.databricks.pyspark.dataFrameChunk.enabled: "true"
                  spark.task.resource.gpu.amount: "0"
                init_scripts:
                  - volumes:
                      destination: /Volumes/${var.catalog}/${var.schema}/${var.volume}/init/osrm-worker.sh

            - job_cluster_key: gpu_distance_cluster
              new_cluster:
                aws_attributes:
                  availability: SPOT_WITH_FALLBACK
                  first_on_demand: 1
                  zone_id: us-east-2a
                data_security_mode: SINGLE_USER
                single_user_name: ${workspace.current_user.userName}
                spark_version: ${var.cpu_spark_version}
                node_type_id: ${var.cpu_node_type_id}
                num_workers: 2
                spark_conf:
                  spark.databricks.pyspark.dataFrameChunk.enabled: "true"
                  spark.task.resource.gpu.amount: "0"
                init_scripts:
                  - volumes:
                      destination: /Volumes/${var.catalog}/${var.schema}/${var.volume}/init/osrm-worker.sh

            - job_cluster_key: cpu_optimize_cluster
              new_cluster:
                aws_attributes:
                  availability: SPOT_WITH_FALLBACK
                  first_on_demand: 1
                  zone_id: us-east-2a
                data_security_mode: SINGLE_USER
                single_user_name: ${workspace.current_user.userName}
                spark_version: ${var.cpu_spark_version}
                node_type_id: ${var.cpu_node_type_id}
                num_workers: 4
                spark_conf:
                  spark.databricks.pyspark.dataFrameChunk.enabled: "true"
                  spark.task.resource.gpu.amount: "0"
  azure:
    mode: development
    workspace:
      profile: adb-984752964297111
    variables:
      cpu_node_type_id: Standard_D16ds_v5
      geocode_node_type_id: Standard_D32ds_v5
    resources:
      jobs:
        routing_end_to_end:
          job_clusters:
            - job_cluster_key: asset_prep_cluster
              new_cluster:
                azure_attributes:
                  availability: SPOT_WITH_FALLBACK_AZURE
                  first_on_demand: 1
                data_security_mode: SINGLE_USER
                single_user_name: ${workspace.current_user.userName}
                spark_version: ${var.cpu_spark_version}
                node_type_id: ${var.cpu_node_type_id}
                num_workers: 0
                spark_conf:
                  spark.databricks.cluster.profile: singleNode
                  spark.master: local[*]
                custom_tags:
                  ResourceClass: SingleNode
            - job_cluster_key: geocode_cluster
              new_cluster:
                azure_attributes:
                  availability: SPOT_WITH_FALLBACK_AZURE
                  first_on_demand: 1
                data_security_mode: SINGLE_USER
                single_user_name: ${workspace.current_user.userName}
                spark_version: ${var.cpu_spark_version}
                node_type_id: ${var.geocode_node_type_id}
                num_workers: 0
                spark_conf:
                  spark.databricks.cluster.profile: singleNode
                  spark.master: local[*]
                custom_tags:
                  ResourceClass: SingleNode
                init_scripts:
                  - volumes:
                      destination: /Volumes/${var.catalog}/${var.schema}/${var.volume}/init/photon-worker.sh
                  - volumes:
                      destination: /Volumes/${var.catalog}/${var.schema}/${var.volume}/init/osrm-worker.sh
            - job_cluster_key: cpu_distance_cluster
              new_cluster:
                azure_attributes:
                  availability: SPOT_WITH_FALLBACK_AZURE
                  first_on_demand: 1
                data_security_mode: SINGLE_USER
                single_user_name: ${workspace.current_user.userName}
                spark_version: ${var.cpu_spark_version}
                node_type_id: ${var.cpu_node_type_id}
                num_workers: 4
                spark_conf:
                  spark.databricks.pyspark.dataFrameChunk.enabled: "true"
                  spark.task.resource.gpu.amount: "0"
                init_scripts:
                  - volumes:
                      destination: /Volumes/${var.catalog}/${var.schema}/${var.volume}/init/osrm-worker.sh
            - job_cluster_key: gpu_distance_cluster
              new_cluster:
                azure_attributes:
                  availability: SPOT_WITH_FALLBACK_AZURE
                  first_on_demand: 1
                data_security_mode: SINGLE_USER
                single_user_name: ${workspace.current_user.userName}
                spark_version: ${var.cpu_spark_version}
                node_type_id: ${var.cpu_node_type_id}
                num_workers: 2
                spark_conf:
                  spark.databricks.pyspark.dataFrameChunk.enabled: "true"
                  spark.task.resource.gpu.amount: "0"
                init_scripts:
                  - volumes:
                      destination: /Volumes/${var.catalog}/${var.schema}/${var.volume}/init/osrm-worker.sh
            - job_cluster_key: cpu_optimize_cluster
              new_cluster:
                azure_attributes:
                  availability: SPOT_WITH_FALLBACK_AZURE
                  first_on_demand: 1
                data_security_mode: SINGLE_USER
                single_user_name: ${workspace.current_user.userName}
                spark_version: ${var.cpu_spark_version}
                node_type_id: ${var.cpu_node_type_id}
                num_workers: 4
                spark_conf:
                  spark.databricks.pyspark.dataFrameChunk.enabled: "true"
                  spark.task.resource.gpu.amount: "0"

resources:
  jobs:
    routing_intro:
      name: "[${bundle.target}] Routing Introduction"
      max_concurrent_runs: 1
      performance_target: PERFORMANCE_OPTIMIZED
      environments:
        - environment_key: intro_cpu
          spec:
            environment_version: "5"
            dependencies:
              - "ortools==9.14.6206"
        - environment_key: intro_gpu
          spec:
            environment_version: "4"

      tasks:
        - task_key: intro_cpu
          environment_key: intro_cpu
          notebook_task:
            notebook_path: 0-introduction/01_cpu_intro.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              sample_table: intro_shipments
              output_table: intro_routes_cpu
              num_shipments: "50"
              num_routes: "6"

        - task_key: intro_gpu
          depends_on:
            - task_key: intro_cpu
          environment_key: intro_gpu
          compute:
            hardware_accelerator: GPU_1xA10
          notebook_task:
            notebook_path: 0-introduction/02_gpu_intro.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              sample_table: intro_shipments
              output_table: intro_routes_gpu
              num_shipments: "50"
              num_routes: "6"
              solver_minutes: "2"

    routing_end_to_end:
      name: "[${bundle.target}] Routing Address-First"
      max_concurrent_runs: 1
      performance_target: PERFORMANCE_OPTIMIZED
      environments:
        - environment_key: serverless_spark
          spec:
            environment_version: "5"
        - environment_key: serverless_gpu
          spec:
            environment_version: "4"

      tasks:
        - task_key: 1a_load_normalize_addresses
          environment_key: serverless_spark
          notebook_task:
            notebook_path: 1-preprocessing-geocoding/03_load_and_normalize_addresses.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              row_limit: "50000"

        - task_key: 1_prepare_assets
          job_cluster_key: asset_prep_cluster
          notebook_task:
            notebook_path: 1-preprocessing-geocoding/01_prepare_assets.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume: ${var.volume}
              region: ${var.region}

        - task_key: 1_validate_services
          depends_on:
            - task_key: 1_prepare_assets
          job_cluster_key: geocode_cluster
          notebook_task:
            notebook_path: 1-preprocessing-geocoding/02_validate_services.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume: ${var.volume}
              region: ${var.region}

        - task_key: 1b_geocode_addresses
          depends_on:
            - task_key: 1a_load_normalize_addresses
            - task_key: 1_validate_services
          job_cluster_key: geocode_cluster
          notebook_task:
            notebook_path: 1-preprocessing-geocoding/04_geocode_addresses_photon.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
        - task_key: 1c_build_shipments
          depends_on:
            - task_key: 1b_geocode_addresses
          environment_key: serverless_spark
          notebook_task:
            notebook_path: 1-preprocessing-geocoding/05_build_shipments.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: 2a_cluster_shipments
          depends_on:
            - task_key: 1c_build_shipments
          environment_key: serverless_spark
          notebook_task:
            notebook_path: 2a-cpu-route-optimization/01_cluster_shipments.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              shipments_table: raw_shipments
              num_shipments: "40000"
              num_routes: "320"

        - task_key: 2a_resolve_osrm
          depends_on:
            - task_key: 2a_cluster_shipments
          job_cluster_key: cpu_distance_cluster
          notebook_task:
            notebook_path: 2a-cpu-route-optimization/02_resolve_osrm_distances.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              num_shipments: "40000"

        - task_key: 2a_finalize_routing
          depends_on:
            - task_key: 2a_resolve_osrm
          environment_key: serverless_spark
          notebook_task:
            notebook_path: 2a-cpu-route-optimization/03_build_routing_table.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              num_shipments: "40000"

        - task_key: 2a_cpu_optimize
          depends_on:
            - task_key: 2a_finalize_routing
          job_cluster_key: cpu_optimize_cluster
          notebook_task:
            notebook_path: 2a-cpu-route-optimization/04_route_optimization.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              num_shipments: "40000"
              temp_volume: ${var.volume}
              optimized_routes_table: optimized_routes

        - task_key: 2b_prepare_sparse_graph
          depends_on:
            - task_key: 1c_build_shipments
          environment_key: serverless_spark
          notebook_task:
            notebook_path: 2b-gpu-route-optimization/01_prepare_sparse_graph.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              shipments_table: raw_shipments
              num_shipments: "10000"
              num_routes: "80"

        - task_key: 2b_resolve_sparse_osrm
          depends_on:
            - task_key: 2b_prepare_sparse_graph
          job_cluster_key: gpu_distance_cluster
          notebook_task:
            notebook_path: 2b-gpu-route-optimization/02_resolve_sparse_osrm.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              num_shipments: "10000"

        - task_key: 2b_gpu_optimize
          depends_on:
            - task_key: 2b_resolve_sparse_osrm
          environment_key: serverless_gpu
          compute:
            hardware_accelerator: GPU_1xA10
          notebook_task:
            notebook_path: 2b-gpu-route-optimization/03_route_optimization.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              shipments_table: raw_shipments
              num_shipments: "10000"
              num_routes: "80"
              max_van: "8000"
              solver_minutes: "20"
              optimized_routes_table: optimized_routes_gpu_10000
